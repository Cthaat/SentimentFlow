services:
    backend:
        build:
            context: .
            dockerfile: ./backend/Dockerfile
        pull_policy: build
        working_dir: /workspace/backend
        restart: unless-stopped
        env_file:
            - ./.env
        environment:
            SENTIMENTFLOW_PROJECT_ROOT: /workspace
        ports:
            - "8846:8846"
        volumes:
            - ./:/workspace
        command: uvicorn app.main:app --host 0.0.0.0 --port 8846
        healthcheck:
            test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8846/health', timeout=3).read()"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    frontend:
        build:
            context: ./frontend
        pull_policy: build
        restart: unless-stopped
        environment:
            BACKEND_API_URL: http://backend:8846
            BACKEND_API_TIMEOUT_MS: 10000
        ports:
            - "30008:3000"
        depends_on:
            backend:
                condition: service_healthy

    slides:
        build:
            context: ./slidev
        pull_policy: build
        restart: unless-stopped
        ports:
            - "3031:3030"
        depends_on:
            backend:
                condition: service_healthy
