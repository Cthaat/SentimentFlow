services:
    backend:
        build:
            context: ./backend
        pull_policy: build
        working_dir: /workspace/backend
        restart: unless-stopped
        env_file:
            - ./.env
        environment:
            SENTIMENTFLOW_PROJECT_ROOT: /workspace
        ports:
            - "8846:8846"
        volumes:
            - ./:/workspace
        command: uvicorn app.main:app --host 0.0.0.0 --port 8846

    frontend:
        build:
            context: ./frontend
        pull_policy: build
        restart: unless-stopped
        environment:
            BACKEND_API_URL: http://backend:8846
            BACKEND_API_TIMEOUT_MS: 10000
        ports:
            - "30008:3000"
        depends_on:
            - backend

    slides:
        build:
            context: ./slidev
        pull_policy: build
        restart: unless-stopped
        ports:
            - "3031:3030"
        depends_on:
            - backend
