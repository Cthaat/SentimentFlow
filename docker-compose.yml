services:
    backend:
        build:
            context: ./backend
            no_cache: true
        pull_policy: build
        working_dir: /workspace/backend
        env_file:
            - ./.env
        environment:
            SENTIMENTFLOW_PROJECT_ROOT: /workspace
        ports:
            - "8846:8846"
        volumes:
            - ./:/workspace
        command: uvicorn app.main:app --host 0.0.0.0 --port 8846

    frontend:
        build:
            context: ./frontend
            no_cache: true
        pull_policy: build
        environment:
            BACKEND_API_URL: http://backend:8846
            BACKEND_API_TIMEOUT_MS: 10000
        ports:
            - "30008:3000"
        depends_on:
            - backend
