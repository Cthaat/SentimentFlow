version: "3.9"
services:
    backend:
        build: ./backend
        ports:
            - "8000:8000"
        volumes:
            - ./backend:/app
        command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

    frontend:
        image: node:20
        working_dir: /app
        ports:
            - "3000:3000"
        volumes:
            - ./frontend:/app
        command: sh -c "npm install && npm run dev"
        depends_on:
            - backend
